<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Roles List</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<h2>Roles</h2>

<a th:href="@{/admin/roles/create}">Create new role</a>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Actions</th>
    </tr>

    <tr th:each="role : ${roles}">

        <td th:text="${role.id}"></td>

        <td th:text="${role.name}"></td>

        <td>

            <a th:href="@{/admin/roles/edit/{id}(id=${role.id})}">
                Edit
            </a>

            <a th:href="@{/admin/roles/delete/{id}(id=${role.id})}"
               onclick="return confirm('Delete role?')">
                Delete
            </a>

        </td>

    </tr>

</table>

<br>

<a th:href="@{/admin/users/list}">Users</a>

</body>
</html>
