<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - New User</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>


<nav class="navbar navbar-dark bg-dark px-3">
    <span class="text-white">
        <b th:text="${#authentication.name}"></b>
        with roles:
        <span th:each="role : ${#authentication.authorities}"
              th:text="${#strings.replace(role.authority,'ROLE_','')} + ' '" th:remove="tag"></span>
    </span>
    <a class="text-white" href="/logout">Logout</a>
</nav>

<div class="container-fluid">
    <div class="row">


        <div class="col-2 bg-light vh-100">
            <ul class="nav flex-column mt-3">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${activePage == 'admin' ? 'active' : ''}"
                       href="/admin/users/list">
                        Admin
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${activePage == 'user' ? 'active' : ''}"
                       href="/user">
                        User
                    </a>
                </li>
            </ul>
        </div>


        <div class="col-10 p-4">


            <h2>Admin Panel</h2>


            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/users/list}">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active">New User</a>
                </li>
            </ul>


            <div class="d-flex justify-content-center">
                <div class="card w-50">
                    <div class="card-header text-center">
                        Create New User
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/users/create}" th:object="${user}" method="post">

                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label text-end">First Name</label>
                                <div class="col-sm-8">
                                    <label>
                                        <input type="text" class="form-control" th:field="*{firstName}" required>
                                    </label>
                                </div>
                            </div>

                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label text-end">Last Name</label>
                                <div class="col-sm-8">
                                    <label>
                                        <input type="text" class="form-control" th:field="*{lastName}" required>
                                    </label>
                                </div>
                            </div>

                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label text-end">Age</label>
                                <div class="col-sm-8">
                                    <label>
                                        <input type="number" class="form-control" th:field="*{age}" required>
                                    </label>
                                </div>
                            </div>

                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label text-end">Email</label>
                                <div class="col-sm-8">
                                    <label>
                                        <input type="email" class="form-control" th:field="*{email}" required>
                                    </label>
                                </div>
                            </div>

                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label text-end">Password</label>
                                <div class="col-sm-8">
                                    <label>
                                        <input type="password" class="form-control" th:field="*{password}" required>
                                    </label>
                                </div>
                            </div>

                            <div class="mb-3 row">
                                <label class="col-sm-4 col-form-label text-end">Roles</label>
                                <div class="col-sm-8">
                                    <label>
                                        <select multiple class="form-select" name="roleIds">
                                            <option th:each="role : ${roles}" th:value="${role.id}"
                                                    th:text="${#strings.replace(role.name,'ROLE_','')}"></option>
                                        </select>
                                    </label>
                                </div>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-success w-50">Create</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
