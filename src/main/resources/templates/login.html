<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="text-center">

<div class="container mt-5" style="max-width: 300px;">
    <h2 class="mb-4 text-center">Please sign in</h2>
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <input type="email" class="form-control" name="username" placeholder="Email address" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign in</button>


        <div th:if="${param.error}" class="text-danger mt-2">Invalid email or password</div>
        <div th:if="${param.logout}" class="text-success mt-2">You have been logged out</div>
    </form>
</div>

</body>
</html>
