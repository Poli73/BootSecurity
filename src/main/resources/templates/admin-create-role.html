<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Create Role</title>
</head>
<body>

<h2>Create Role</h2>

<form th:object="${role}"
      th:action="@{/admin/roles/create}"
      method="post">

    Name:
    <label>
        <input type="text"
               th:field="*{name}"
               required/>
    </label>

    <br><br>

    <button type="submit">Create</button>

</form>

<br>

<a th:href="@{/admin/roles/list}">Back</a>

</body>
</html>
