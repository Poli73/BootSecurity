<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>


<nav class="navbar navbar-dark bg-dark px-3">
    <span class="text-white">
             <b th:text="${#authentication.name}"></b>
        with roles:
        <span th:each="role : ${#authentication.authorities}"
              th:text="${#strings.replace(role.authority,'ROLE_','')} + ' '" th:remove="tag"></span>
    </span>

    <a class="text-white" href="/logout">Logout</a>
</nav>

<div class="container-fluid">
    <div class="row">


        <div class="col-2 bg-light vh-100">
            <ul class="nav flex-column mt-3">
                <li class="nav-item">
                    <a class="nav-link active" href="/user">User</a>
                </li>
            </ul>
        </div>


        <div class="col-10 p-4">
            <h2>User Information</h2>

            <div class="card mt-3">
                <div class="card-header">
                    About User
                </div>
                <div class="card-body">

                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${#strings.replace(role.name,'ROLE_','')} + ' '" th:remove="tag"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
